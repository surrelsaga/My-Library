<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
  </head>
  <body>

    <header>
      <h1>My Library</h1>
      <button id="new-book-btn">+ New Book</button>
    </header>

    <main>
      <!-- Book cards will be rendered here by JavaScript -->
      <div id="library-grid"></div>
    </main>

    <!-- Dialog / modal for adding a new book -->
    <!-- The dialog tag is for "New book" popup form. Instead of navigating to a new page -->
     <!-- A window of the form will appear on top of the current page -->
    <dialog id="book-dialog">
      <form id="book-form">
        <h2>Add a New Book</h2>

        <label for="title">Title</label>
        <input type="text" id="title" name="title" required />

        <label for="author">Author</label>
        <input type="text" id="author" name="author" required />

        <label for="pages">Pages</label>
        <input type="number" id="pages" name="pages" min="1" required />

        <label>
          <input type="checkbox" id="read" name="read" value="yes">
          I have read this book
        </label>

        <div class="form-buttons">
          <button type="submit">Add Book</button>
          <button type="button" id="cancel-btn">Cancel</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
